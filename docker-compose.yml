version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: greenledger-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: greenledger
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: greenledger-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/greenledger?authSource=admin
      JWT_SECRET: your-secret-key-change-this
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-service:
    build: ./ai-service
    container_name: greenledger-ai
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - ./ai-service:/app

volumes:
  mongodb_data:
