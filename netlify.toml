[build]
  base = "frontend/"
  command = "npm install && npm run build"
  publish = "build/"

[functions]
  directory = "../backend/"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
