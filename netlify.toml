[build]
  command = "(cd backend && npm install) && (cd frontend && npm install && npm run build)"
  publish = "frontend/build/"

[functions]
  directory = "backend/functions/"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
